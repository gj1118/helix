# ========================================================================
# ADVANCED PARSING OPTIONS
# ========================================================================

[parsing]

[parsing.header]
detect = ["[\\@]class"]
styler = "###"

[parsing.line]
detect = ["[\\@]brief"]
styler = "**"

[parsing.listing]
detect = ["[\\@]li"]
styler = " - "

[parsing.references]
detect = ["[\\@]ref", "[\\@]c", "[\\@]name"]
styler = ["**", "`"]

[parsing.group]
styler = "`"

[parsing.group.detect]
Parameters = ["[\\@]param", "[\\@]*param*"]
Types = ["[\\@]tparam"]
See = ["[\\@]see"]
"Return Value" = ["[\\@]retval"]

[parsing.code]
start = ["[\\@]code"]
ending = ["[\\@]endcode"]

[parsing.return_statement]
patterns = ["[\\@]return", "[\\@]*return*"]

# ========================================================================
# SYNTAX HIGHLIGHTING
# ========================================================================

[highlighting.error]
color = "#DC2626"
detect = ["[\\@]error", "[\\@]bug"]
line = false

[highlighting.warning]
color = "#FBBF24"
detect = ["[\\@]warning", "[\\@]thread_safety", "[\\@]throw"]
line = false

[highlighting.info]
color = "#2563EB"
detect = ["[\\@]remark", "[\\@]note", "[\\@]notes"]
line = false