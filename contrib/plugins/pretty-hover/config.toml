# Pretty-Hover Plugin Configuration
# This file configures the enhanced hover documentation display

[plugin]
enabled = true

[behavior]
max_width = 120
max_height = 30
wrap = true
multi_server = true
number_conversion = true

# ========================================================================
# BORDER STYLING CONFIGURATION
# ========================================================================

[border]
# Border style: "rounded", "all", "top", "bottom", "left", "right", "none"
style = "rounded"

# Border thickness (1-5): 1=thin, 2=thick, 3=double, 4=block, 5=full
thickness = 1

# Simple solid color (fallback if gradient is not specified)
color = "ui.text.focus"

# Animation speed (0 = no animation, 1-10 = speed)
animation_speed = 0

# ========================================================================
# GRADIENT CONFIGURATION
# ========================================================================

[border.gradient]
# Enable gradient borders
enabled = true

# Gradient colors (hex colors)
colors = ["#dc8a78", "#1e66f5"]

# Gradient direction: "horizontal", "vertical", "diagonal", "radial"
direction = "horizontal"

# Number of interpolation steps for smoother gradients
steps = 10

